# Hugo configuration file
title: "berserk.iT"

# Multilíngue: PT é o idioma padrão (sem prefixo de URL), EN fica em /en/
defaultContentLanguage: pt
defaultContentLanguageInSubdir: false

languages:
  pt:
    languageCode: "pt-BR"
    languageName: "PT"
    weight: 1
    params:
      description: "Blog técnico de Bruno Cubero sobre homelab, Linux, hardware e tecnologia."
    menu:
      main:
        - name: Início
          pageRef: /
          weight: 1
        - name: Sobre
          pageRef: /about
          weight: 2
        - name: LinkedIn
          weight: 3
          url: "https://www.linkedin.com/in/brunocuberoti/"
          params:
            icon: linkedin
        - name: GitHub
          weight: 4
          url: "https://github.com/bsk-iT"
          params:
            icon: github
        - name: Twitter
          weight: 5
          url: "https://x.com/brunOcuberO"
          params:
            icon: x-twitter
        - name: Portfolio
          weight: 6
          url: "https://portfolio-bsk.vercel.app/"
          params:
            icon: briefcase
        - name: Search
          weight: 7
          params:
            type: search
        - name: RSS
          weight: 8
          url: "/index.xml"
          params:
            icon: rss
        - name: Theme
          weight: 9
          params:
            type: theme-toggle
  en:
    languageCode: "en"
    languageName: "EN"
    weight: 2
    params:
      description: "Bruno Cubero's technical blog about homelab, Linux, hardware and technology."
    menu:
      main:
        - name: Home
          pageRef: /
          weight: 1
        - name: About
          pageRef: /about
          weight: 2
        - name: LinkedIn
          weight: 3
          url: "https://www.linkedin.com/in/brunocuberoti/"
          params:
            icon: linkedin
        - name: GitHub
          weight: 4
          url: "https://github.com/bsk-iT"
          params:
            icon: github
        - name: Twitter
          weight: 5
          url: "https://x.com/brunOcuberO"
          params:
            icon: x-twitter
        - name: Portfolio
          weight: 6
          url: "https://portfolio-bsk.vercel.app/"
          params:
            icon: briefcase
        - name: Search
          weight: 7
          params:
            type: search
        - name: RSS
          weight: 8
          url: "/index.xml"
          params:
            icon: rss
        - name: Theme
          weight: 9
          params:
            type: theme-toggle

# Para blog, normalmente faz sentido expor RSS na home
outputs:
  home: [HTML, RSS]

services:
  disqus:
    shortname: "berserk.iT"

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: false
  highlight:
    noClasses: false

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: true
    displayPoweredBy: true

  editURL:
    enable: false

  # Opcional, mas útil se você pretende embedar vídeos
  youtubeDefaults:
    iframeAllowList: "accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture; web-share"
    referrerpolicy: "no-referrer"
    iframeStyle: "border:0; width:100%; aspect-ratio:16/9;"

  theme:
    default: light

  author:
    name: "Bruno Cubero"
    email: "bruno.cubero@proton.me"
