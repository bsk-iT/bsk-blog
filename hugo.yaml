# Hugo configuration file
title: "berserk.iT"
languageCode: "pt-BR"

# Para blog, normalmente faz sentido expor RSS na home
outputs:
  home: [HTML, RSS]

services:
  disqus:
    shortname: "berserk.iT"

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - name: Início
      pageRef: /
      weight: 1
    - name: About
      pageRef: /about
      weight: 2
    - name: Search
      weight: 3
      params:
        type: search
    - name: RSS
      weight: 4
      url: "/index.xml"
      params:
        icon: rss
    - name: GitHub
      weight: 5
      url: "https://github.com/bsk-iT"
      params:
        icon: github
    - name: Twitter
      weight: 6
      url: "https://x.com/brunOcuberO"
      params:
        icon: x-twitter

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: true
    displayPoweredBy: true

  # Recomendo DESABILITAR editURL (isso é do starter template)
  editURL:
    enable: false

  # Opcional, mas útil se você pretende embedar vídeos
  youtubeDefaults:
    iframeAllowList: "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    referrerpolicy: "no-referrer"
    iframeStyle: "border:0; width:100%; aspect-ratio:16/9;"

  theme:
    default: light

  author:
    name: "Bruno Cubero"
    email: "bruno.cubero@proton.me"

  description: "DESCRIÇÃO CURTA DO BLOG (SEO)."
