{{- /* Segurança: CSP mínima e headers via meta para GitHub Pages */ -}}
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://disqus.com https://*.disqus.com https://*.disquscdn.com; style-src 'self' 'unsafe-inline'; img-src * data: blob:; frame-src https://*.disqus.com https://www.youtube.com https://www.youtube-nocookie.com; connect-src 'self' https://disqus.com https://*.disqus.com https://*.disquscdn.com; object-src 'none'; base-uri 'self'; form-action 'self' https://disqus.com;" />
<meta http-equiv="X-Content-Type-Options" content="nosniff" />
<meta name="referrer" content="strict-origin-when-cross-origin" />

<link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }} RSS Feed" href="{{ "index.xml" | absURL }}" />

<style>
  /* Embeds responsivos (útil para iframes variados) */
  .embed-container {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    height: 0;
    overflow: hidden;
    max-width: 100%;
  }

  .embed-container iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  /* Legibilidade para textos longos e técnicos */
  main {
    line-height: 1.6;
    font-size: 18px;
  }

  /* Evita "explodir" layout com linhas longas em código */
  .hextra-code-block pre {
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: anywhere;
  }

  /* Aviso: este seletor depende de classes internas do Hextra e pode quebrar em atualizações. */
  /* Centraliza o footer em todos os tamanhos de tela */
  .hextra-footer > div[class*="hextra-max-footer-width"] {
    justify-content: center !important;
  }

  .hextra-footer > div[class*="hextra-max-footer-width"] > div {
    align-items: center !important;
  }
</style>

<script>
  /* Inicializa data-theme nos elementos pai do toggle ao carregar a página */
  (function () {
    var stored = localStorage.getItem('color-theme');
    var defaultTheme = '{{ site.Params.theme.default | default "light" }}';
    var theme = stored || defaultTheme;
    /* Normaliza: qualquer valor fora de light/dark vira light */
    if (theme !== 'dark') { theme = 'light'; }
    document.querySelectorAll('[data-theme]').forEach(function (el) {
      el.dataset.theme = theme;
    });
  })();
</script>
