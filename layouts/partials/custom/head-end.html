{{- /* Segurança: CSP mínima e headers via meta para GitHub Pages */ -}}
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://giscus.app; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src * data: blob:; frame-src https://giscus.app https://www.youtube.com https://www.youtube-nocookie.com; connect-src 'self' https://giscus.app https://api.github.com; object-src 'none'; base-uri 'self'; form-action 'self';" />
<meta http-equiv="X-Content-Type-Options" content="nosniff" />
<meta name="referrer" content="strict-origin-when-cross-origin" />

<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="alternate icon" href="/favicon.svg" />

<link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }} RSS Feed" href="{{ "index.xml" | absURL }}" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400&family=Source+Sans+3:wght@600;700&display=swap"
  rel="stylesheet"
/>

<style>
  /* Embeds responsivos (útil para iframes variados) */
  .embed-container {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%;
    height: 0;
    overflow: hidden;
    max-width: 100%;
  }

  .embed-container iframe {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }

  /* Tipografia principal: Source Serif 4 para corpo do texto */
  main {
    line-height: 1.7;
    font-size: 19px;
    font-family: "Source Serif 4", "Charter", "Bitstream Charter", "Georgia", serif;
    text-rendering: optimizeLegibility;
    font-kerning: normal;
    hyphens: auto;
  }

  /* Títulos: Source Sans 3 (sem serifa, pesado) */
  .content :where(h1, h2, h3, h4, h5, h6) {
    font-family: "Source Sans 3", "Helvetica Neue", "Segoe UI", "Arial", sans-serif;
    font-weight: 700;
    letter-spacing: -0.012em;
    line-height: 1.15;
  }

  /* Evita "explodir" layout com linhas longas em código */
  .hextra-code-block pre {
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: anywhere;
  }

  /* Language switcher inline abaixo de títulos */
  div.lang-switch {
    display: inline-flex;
    align-items: center;
    gap: 0.6em;
    font-size: 0.95rem;
    font-family: "Source Sans 3", "Helvetica Neue", sans-serif;
    letter-spacing: 0.1em;
    color: #999;
  }

  div.lang-switch .lang-switch__current {
    text-decoration: underline;
    text-underline-offset: 3px;
    font-weight: 600;
    color: #555;
  }

  div.lang-switch .lang-switch__sep {
    color: #ccc;
  }

  div.lang-switch .lang-switch__other {
    color: #999;
    opacity: 0.6;
    text-decoration: none;
    transition: opacity 0.15s;
  }

  div.lang-switch .lang-switch__other:hover {
    opacity: 1;
  }

  /* Giscus: ocupa largura total do container */
  .giscus,
  .giscus-frame {
    width: 100% !important;
    min-width: 0 !important;
  }

  /* Aviso: este seletor depende de classes internas do Hextra e pode quebrar em atualizações. */
  /* Centraliza o footer em todos os tamanhos de tela */
  .hextra-footer > div[class*="hextra-max-footer-width"] {
    justify-content: center !important;
  }

  .hextra-footer > div[class*="hextra-max-footer-width"] > div {
    align-items: center !important;
  }
</style>

<script>
  /* Inicializa data-theme nos elementos pai do toggle ao carregar a página */
  (function () {
    var stored = localStorage.getItem('color-theme');
    var defaultTheme = '{{ site.Params.theme.default | default "light" }}';
    var theme = stored || defaultTheme;
    /* Normaliza: qualquer valor fora de light/dark vira light */
    if (theme !== 'dark') { theme = 'light'; }
    document.querySelectorAll('[data-theme]').forEach(function (el) {
      el.dataset.theme = theme;
    });
  })();

  /* Sincroniza tema do Giscus via MutationObserver no <html class="dark|light">
     Garante que o postMessage é enviado APÓS o Hextra atualizar o DOM,
     evitando race condition com o click listener do vendor/giscus.html */
  (function () {
    function getGiscusIframe() {
      return document.querySelector('iframe.giscus-frame')
          || document.querySelector('iframe[src*="giscus.app"]');
    }

    function sendGiscusTheme(theme) {
      var iframe = getGiscusIframe();
      if (!iframe) return;
      iframe.contentWindow.postMessage(
        { giscus: { setConfig: { theme: theme } } },
        'https://giscus.app'
      );
    }

    function syncTheme() {
      var isDark = document.documentElement.classList.contains('dark');
      var theme = isDark ? 'dark' : 'light';
      /* Tenta imediatamente; se iframe ainda não carregou, tenta novamente */
      if (!getGiscusIframe()) {
        setTimeout(function () { sendGiscusTheme(theme); }, 1000);
      } else {
        sendGiscusTheme(theme);
      }
    }

    var observer = new MutationObserver(function (mutations) {
      mutations.forEach(function (mutation) {
        if (mutation.attributeName === 'class') {
          syncTheme();
        }
      });
    });

    document.addEventListener('DOMContentLoaded', function () {
      observer.observe(document.documentElement, { attributes: true });
    });
  })();
</script>
